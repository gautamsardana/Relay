version: "2"

sql:
  - schema: "internal/migrations"
    queries: "internal/store/queries"
    engine: "postgresql"
    gen:
      go:
        out: "internal/store/sqlc"
        package: "sqlc"
        emit_json_tags: true
        overrides:
          - db_type: "workflow_status"
            go_type:
              import: "github.com/gautamsardana/relay/internal/models"
              package: "models"
              type: "WorkflowStatus"
          - db_type: "step_status"
            go_type:
              import: "github.com/gautamsardana/relay/internal/models"
              package: "models"
              type: "StepStatus"
          - db_type: "uuid"
            go_type:
              import: ""
              package: ""
              type: "string"
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              package: "json"
              type: "RawMessage"
          - db_type: "jsonb"
            nullable: true
            go_type:
              import: "github.com/sqlc-dev/pqtype"
              package: "pqtype"
              type: "NullRawMessage"